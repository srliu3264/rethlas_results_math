# Production URL for files generated by `zola build`.
base_url = "https://srliu3264.github.io/rethlas_results_math/"
theme = "MATbook"
title = "rethlas results"
description = "Proof generation results"
compile_sass = true
build_search_index = true

taxonomies = [
  { name = "tags", paginate_by = 10, rss = true }
]

[markdown]
external_links_target_blank = true
smart_punctuation = true

[markdown.highlighting]
theme = "github-dark"

[extra]
tikzjax = false
mathjax = true

[extra.booktheme]
book_number_chapters = true
book_only_current_section_pages = false
home_url = "https://github.com/frenzymath/Rethlas"
